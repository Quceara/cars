databases:
  - name: car-landing-db
    plan: free

services:
  - type: web
    name: car-landing-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: car-landing-db
          property: connectionString
      - key: ENCAR_RUN_STARTUP_UPDATE
        value: "false"
      - key: ENCAR_ENABLE_SCHEDULER
        value: "false"

  - type: cron
    name: car-landing-daily-update
    runtime: python
    schedule: "0 3 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -c "from app.scheduler import update_encar_data; update_encar_data()"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: car-landing-db
          property: connectionString
